<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Neural Link</title>
    <style>
        :root {
            --bg-main: #FFFFFF; --bg-secondary: #F4F4F5;
            --text-primary: #09090B; --text-secondary: #71717A;
            --border-light: #E4E4E7; --accent-color: #D97757;
            --btn-bg: #18181B; --btn-text: #FFFFFF;
            --sidebar-width: 280px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg-main: #09090B; --bg-secondary: #18181B;
            --text-primary: #FAFAFA; --text-secondary: #A1A1AA;
            --border-light: #27272A; --accent-color: #E2886D;
            --btn-bg: #FAFAFA; --btn-text: #09090B;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
        }

        body { 
            background-color: var(--bg-main); color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Custom Scrollbar for premium feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        #app-layout { display: flex; width: 100%; height: 100vh; }

        /* --- Sidebar Styling --- */
        #sidebar {
            width: var(--sidebar-width); background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: 0.3s;
        }
        
        .sidebar-header {
            padding: 24px 20px; font-weight: 600; border-bottom: 1px solid var(--border-light);
            font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #history-list { flex-grow: 1; overflow-y: auto; padding: 12px; }

        .history-item {
            padding: 12px 16px; margin-bottom: 6px; border-radius: 8px;
            font-size: 14px; cursor: pointer; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: all 0.2s ease; border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-main); border-color: var(--border-light);
            box-shadow: var(--shadow-sm); transform: translateY(-1px);
        }

        /* --- Main Content Area --- */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }

        header { 
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 32px; border-bottom: 1px solid var(--border-light); 
            flex-shrink: 0; box-sizing: border-box; background: var(--bg-main);
        }
        
        header h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        
        #chat-container { 
            width: 100%; max-width: 850px; margin: 0 auto; flex-grow: 1; 
            padding: 40px 20px 20px 20px; overflow-y: auto; box-sizing: border-box; 
        }
        
        .message { margin-bottom: 32px; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-header { font-weight: 600; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); }
        .msg-bubble { line-height: 1.6; font-size: 15px; padding: 16px 20px; border-radius: 12px; background: var(--bg-secondary); box-shadow: var(--shadow-sm); display: inline-block; max-width: 90%; }
        
        .user { align-items: flex-end; }
        .user .msg-bubble { background: var(--btn-bg); color: var(--btn-text); box-shadow: var(--shadow-md); }
        .user .msg-header { flex-direction: row-reverse; }

        .avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: bold; color: white; background-color: var(--accent-color); box-shadow: var(--shadow-sm); }
        .user .avatar { background-color: var(--text-secondary); }
        
        #input-wrapper { width: 100%; max-width: 850px; margin: 0 auto; padding: 0 20px 30px 20px; flex-shrink: 0; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
        
        /* --- Quick Action Chips --- */
        .action-chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            background: var(--bg-main); border: 1px solid var(--border-light); 
            color: var(--text-secondary); padding: 8px 14px; border-radius: 20px;
            font-size: 12px; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 6px; font-weight: 500;
        }
        .chip:hover { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--text-secondary); transform: translateY(-2px); }

        #input-area { display: flex; background: var(--bg-main); border: 1px solid var(--border-light); border-radius: 16px; padding: 8px; box-shadow: var(--shadow-md); transition: 0.3s; }
        #input-area:focus-within { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.1); }
        #user-input { flex-grow: 1; padding: 12px 16px; background: transparent; border: none; font-size: 15px; outline: none; color: var(--text-primary); }
        
        .send-btn { background-color: var(--btn-bg); color: var(--btn-text); border: none; padding: 0 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .send-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .action-btn { background: var(--bg-secondary); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: 8px; font-weight: 500; cursor: pointer; color: var(--text-primary); transition: 0.2s; font-size: 13px; }
        .action-btn:hover { background: var(--border-light); }

        /* Auth & Modals */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 200; display: flex; justify-content: center; align-items: center; }
        .auth-box { background-color: var(--bg-main); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border-light); }
        .auth-box h2 { font-weight: 700; margin: 0 0 10px 0; text-align: center; font-size: 24px;}
        .auth-box input { padding: 14px 16px; border: 1px solid var(--border-light); border-radius: 10px; font-size: 15px; background: var(--bg-secondary); color: var(--text-primary); outline:none; }
        .auth-box input:focus { border-color: var(--accent-color); }
        
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--bg-main); padding: 30px; border-radius: 16px; width: 90%; max-width: 600px; border: 1px solid var(--border-light); box-shadow: var(--shadow-md); }
        textarea { width: 100%; height: 300px; font-family: 'Courier New', Courier, monospace; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-light); padding: 16px; box-sizing: border-box; border-radius: 8px; outline:none;}

        .thinking-indicator { display: flex; gap: 5px; padding: 16px 20px; background: var(--bg-secondary); border-radius: 12px; display: inline-flex; box-shadow: var(--shadow-sm); }
        .dot { width: 6px; height: 6px; background-color: var(--text-secondary); border-radius: 50%; animation: pulse 1.5s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 1; } }

        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>Jarvis Core</h2>
            <input type="text" id="auth-username" placeholder="Username">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="send-btn" style="padding: 14px; margin-top: 10px;" onclick="authenticate()">Authenticate</button>
            <button class="action-btn" style="border:none; background:transparent; font-size: 13px;" onclick="requestReset()">Forgot Password?</button>
            <div id="auth-error" style="text-align: center; min-height: 20px; font-size: 13px; color: #ef4444; font-weight:500;"></div>
        </div>
    </div>

    <div id="app-layout">
        
        <aside id="sidebar">
            <div class="sidebar-header">
                Memory Logs
                <button class="action-btn" style="padding: 4px 10px; font-size: 11px;" onclick="clearHistory()">Clear</button>
            </div>
            <div id="history-list"></div>
        </aside>

        <main id="main-content">
            <header>
                <h1>Jarvis</h1>
                <div class="header-controls" style="display:flex; gap: 10px; align-items:center;">
                    <span id="display-username" style="margin-right: 15px; font-weight:500; font-size: 14px;"></span>
                    <button class="action-btn" onclick="toggleTheme()">🌗 Theme</button>
                    <button class="action-btn" onclick="openSettings()">⚙️ Core</button>
                    <button class="action-btn" onclick="logout()">Sign Out</button>
                </div>
            </header>
            
            <div id="chat-container"></div>

            <div id="input-wrapper">
                <div class="action-chips">
                    <div class="chip" onclick="insertPrompt(`Use your tool to add a calendar event. Title: '[TITLE]', Start: 'YYYY-MM-DDTHH:MM:SS', End: 'YYYY-MM-DDTHH:MM:SS'.`)">📅 Add Event</div>
                    <div class="chip" onclick="insertPrompt(`What is on my Google Calendar for today?`)">🗓️ Check Calendar</div>
                    <div class="chip" onclick="insertPrompt(`Send an email to [EMAIL] with the subject '[SUBJECT]' saying: [MESSAGE]`)">📧 Send Email</div>
                </div>

                <div id="input-area">
                    <input type="text" id="user-input" placeholder="Message Jarvis..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>

    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Memory Core Parameters</h2>
            <textarea id="profile-editor"></textarea>
            <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button class="action-btn" onclick="closeSettings()">Cancel</button>
                <button class="send-btn" style="padding: 8px 24px;" onclick="saveSettings()">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        // --- Feature: Auto-insert text from Chips ---
        function insertPrompt(text) {
            const input = document.getElementById('user-input');
            input.value = text;
            input.focus();
            // Highlight the first bracketed text so the user can easily type over it
            const firstBracket = text.indexOf('[');
            const lastBracket = text.indexOf(']');
            if (firstBracket !== -1 && lastBracket !== -1) {
                input.setSelectionRange(firstBracket, lastBracket + 1);
            }
        }

        // --- Feature: Starting Greeting ---
        function triggerWelcomeMessage() {
            const container = document.getElementById("chat-container");
            // Only greet if the chat is currently empty
            if (container.innerHTML.trim() === "") {
                const welcomeText = "Good day. I am Jarvis. All core systems and neural links are online. How may I assist you today?";
                container.innerHTML += `
                    <div class="message jarvis">
                        <div class="msg-header"><div class="avatar">✦</div>Jarvis</div>
                        <div class="msg-bubble">${welcomeText}</div>
                    </div>`;
            }
        }

        // --- Dark Mode Logic ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // --- History Array Logic ---
        let chatHistoryArray = JSON.parse(localStorage.getItem('jarvis_history')) || [];

        function renderSidebar() {
            const list = document.getElementById("history-list");
            list.innerHTML = "";
            [...chatHistoryArray].reverse().forEach(item => {
                list.innerHTML += `<div class="history-item" onclick="loadHistoryItem('${item.id}')">${item.title}</div>`;
            });
        }

        function saveToHistory(userText, jarvisReply) {
            const newItem = {
                id: Date.now().toString(),
                title: userText,
                user: userText,
                jarvis: jarvisReply
            };
            chatHistoryArray.push(newItem);
            localStorage.setItem('jarvis_history', JSON.stringify(chatHistoryArray));
            renderSidebar();
        }

        function loadHistoryItem(id) {
            const item = chatHistoryArray.find(x => x.id === id);
            if (!item) return;
            const container = document.getElementById("chat-container");
            container.innerHTML += `
                <div style="text-align: center; font-size: 11px; font-weight:600; text-transform:uppercase; color: var(--text-secondary); margin: 30px 0 20px 0; letter-spacing: 1px;">--- Memory Log Retrieved ---</div>
                <div class="message user"><div class="msg-header"><div class="avatar">U</div>User</div><div class="msg-bubble">${item.user}</div></div>
                <div class="message jarvis"><div class="msg-header"><div class="avatar">✦</div>Jarvis</div><div class="msg-bubble">${item.jarvis}</div></div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function clearHistory() {
            if(confirm("Clear all local memory logs?")) {
                chatHistoryArray = [];
                localStorage.removeItem('jarvis_history');
                renderSidebar();
            }
        }

        // --- Core Application Logic ---
        async function authenticate() {
            const u = document.getElementById("auth-username").value;
            const p = document.getElementById("auth-password").value;
            const res = await fetch("/auth/login", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if (data.success) { location.reload(); }
            else { document.getElementById("auth-error").innerText = data.message; }
        }

        async function requestReset() { /* Existing reset logic */ }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;
            
            const container = document.getElementById("chat-container");
            container.innerHTML += `<div class="message user"><div class="msg-header"><div class="avatar">U</div>User</div><div class="msg-bubble">${text}</div></div>`;
            input.value = "";
            container.scrollTop = container.scrollHeight;

            const thinkingId = "thinking-" + Date.now();
            container.innerHTML += `
                <div class="message jarvis" id="${thinkingId}">
                    <div class="msg-header"><div class="avatar">✦</div>Jarvis</div>
                    <div class="thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>`;
            container.scrollTop = container.scrollHeight;
            
            try {
                const response = await fetch("/chat", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                document.getElementById(thinkingId).remove();
                container.innerHTML += `<div class="message jarvis"><div class="msg-header"><div class="avatar">✦</div>Jarvis</div><div class="msg-bubble">${data.reply}</div></div>`;
                container.scrollTop = container.scrollHeight;

                saveToHistory(text, data.reply);
            } catch (error) {
                document.getElementById(thinkingId).remove();
                container.innerHTML += `<div class="message jarvis" style="color:#ef4444;"><div class="msg-header"><div class="avatar" style="background:#ef4444;">!</div>Error</div><div class="msg-bubble">System error connecting to neural link.</div></div>`;
            }
        }

        function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
        
        async function openSettings() {
            const res = await fetch("/get_profile");
            const data = await res.json();
            document.getElementById("profile-editor").value = JSON.stringify(data, null, 4);
            document.getElementById("settings-modal").style.display = "flex";
        }
        function closeSettings() { document.getElementById("settings-modal").style.display = "none"; }
        async function saveSettings() {
            const val = document.getElementById("profile-editor").value;
            await fetch("/update_profile", { method: "POST", headers: { "Content-Type": "application/json" }, body: val });
            closeSettings();
        }
        async function logout() { await fetch("/auth/logout", {method: "POST"}); location.reload(); }
        
        window.onload = async () => {
            renderSidebar(); 
            const res = await fetch("/auth/status");
            const data = await res.json();
            if (data.logged_in) {
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("display-username").innerText = data.username;
                triggerWelcomeMessage(); // Triggers the starting greeting!
            }
        };
    </script>
</body>
</html>
